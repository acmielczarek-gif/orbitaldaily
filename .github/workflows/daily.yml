name: Regenerate Orbital Daily

on:
  schedule:
    - cron: '0 6 * * *'    # Morning -- newsletter + full update
    - cron: '0 18 * * *'   # Afternoon -- refresh only, no email
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate site
        run: python generate.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          N2YO_API_KEY: ${{ secrets.N2YO_API_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}

      - name: Commit and push
        run: |
          git config user.name  "Orbital Daily Bot"
          git config user.email "bot@orbitaldaily.com"
          git add index.html sitemap.xml llms.txt sai_history.json editorial_history.json prediction_history.json
          git diff --staged --quiet || (
            git commit -m "Daily update $(date -u +%Y-%m-%dT%H:%M)"
            git push
          )
