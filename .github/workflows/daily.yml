name: Regenerate Orbital Daily

on:
  schedule:
    - cron: '0 6 * * *'   # Runs every day at 6 AM UTC (2 AM Eastern)
  workflow_dispatch:        # Lets you trigger it manually from the GitHub website

permissions:
  contents: write           # Needed so the bot can commit index.html back to the repo

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate index.html
        run: python generate.py

      - name: Commit and push updated site
        run: |
          git config user.name  "Orbital Daily Bot"
          git config user.email "bot@orbitaldaily.com"
          git add index.html
          # Only commit if something actually changed
          git diff --staged --quiet || (
            git commit -m "Daily update $(date -u +%Y-%m-%d)"
            git push
          )
