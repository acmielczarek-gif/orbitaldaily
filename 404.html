<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 -- Orbital Daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#faf9f5;color:#14181d;font-family:'Newsreader',Georgia,serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 24px;}
.wrap{max-width:480px;}
.mono{font-family:'IBM Plex Mono',monospace;}
.code{font-size:80px;font-weight:600;line-height:1;letter-spacing:-.03em;color:#14181d;}
.rule{width:48px;height:2px;background:#14181d;margin:20px auto;}
h1{font-size:28px;font-weight:600;letter-spacing:-.02em;margin-bottom:12px;}
p{font-size:17px;line-height:1.6;color:#4a4f57;margin-bottom:28px;}
.links{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
a.btn{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#faf9f5;background:#1b3a6b;padding:12px 24px;border-radius:4px;text-decoration:none;}
a.link{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#1b3a6b;padding:12px;text-decoration:none;border-bottom:1px solid #b7c3d3;}
</style>
</head>
<body>
<div class="wrap">
  <div class="mono code">404</div>
  <div class="rule"></div>
  <h1>Page not found.</h1>
  <p>This page drifted out of orbit. The dashboard is still live -- head back and check tonight's conditions.</p>
  <div class="links">
    <a href="/" class="btn">Back to the dispatch</a>
    <a href="/sitemap.xml" class="link">Sitemap</a>
  </div>
</div>
</body>
</html>
